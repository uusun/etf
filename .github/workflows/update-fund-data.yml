name: Update fund NAV data

on:
  workflow_dispatch:
  schedule:
    # 北京时间 20:00–21:30，每5分钟一次（UTC 12:00–13:30）
    - cron: "*/5 12 * * 1-5"
    - cron: "0,5,10,15,20,25,30 13 * * 1-5"
    
permissions:
  contents: write

concurrency:
  group: update-fund-nav
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-fund-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify script version
        run: |
          grep -n "SCRIPT_VERSION" scripts/update_fund_data.py || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas requests lxml beautifulsoup4 html5lib

      - name: Update fund data JSON
        run: python scripts/update_fund_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fund_latest.json data/fund_history.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update fund NAV data"
            git push
          fi

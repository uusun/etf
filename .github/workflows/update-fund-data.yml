name: Update fund NAV data

on:
  workflow_dispatch:
    inputs:
      expected_date:
        description: "可选：强制指定预期交易日，例如 2026-05-13；留空则按北京时间最近工作日"
        required: false
        default: ""
  schedule:
    # GitHub cron 使用 UTC；北京时间 = UTC+8
    # 21:10 / 21:40 / 22:10 北京时间，对应 13:10 / 13:40 / 14:10 UTC
    - cron: "10 13 * * 1-5"
    - cron: "40 13 * * 1-5"
    - cron: "10 14 * * 1-5"

permissions:
  contents: write

concurrency:
  group: update-fund-nav
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  EXPECTED_TRADE_DATE: ${{ github.event.inputs.expected_date }}

jobs:
  update-fund-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify script version
        run: |
          echo "Workflow file is running from commit $GITHUB_SHA"
          grep -n "SCRIPT_VERSION" scripts/update_fund_data.py | head -5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas requests lxml beautifulsoup4 html5lib

      - name: Update fund data JSON
        run: python scripts/update_fund_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fund_latest.json data/fund_history.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update fund NAV data"
            git push
          fi

name: Update fund NAV data

on:
  workflow_dispatch:
  schedule:
    # 北京时间周一到周五 21:10；GitHub cron 使用 UTC，所以这里是 13:10 UTC
    - cron: "10 13 * * 1-5"

permissions:
  contents: write

jobs:
  update-fund-data:
    runs-on: ubuntu-latest
    env:
      # 强制使用Node.js 24运行所有actions，彻底消除警告
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.0

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas requests lxml beautifulsoup4 html5lib

      - name: Update fund data JSON
        run: python scripts/update_fund_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fund_latest.json data/fund_history.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update fund NAV data"
            git push
          fi

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美股ETF监控</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--card:#fff;--bd:#e4e7ed;--txt:#1d2129;
  --mut:#6b7280;--dim:#9ca3af;--blu:#2563eb;--blt:#eff6ff;
  --red:#dc2626;--grn:#16a34a;
  --phi-bg:#fef2f2;--phi-fg:#dc2626;
  --pmd-bg:#fffbeb;--pmd-fg:#92400e;
  --plo-bg:#f0fdf4;--plo-fg:#15803d;
  --mono:'Consolas','Menlo','Courier New',monospace;
  --sans:'Microsoft YaHei','PingFang SC',Arial,sans-serif;
}
body{background:var(--bg);color:var(--txt);font-family:var(--sans);font-size:13px;min-height:100vh}
.hd{background:var(--card);border-bottom:1px solid var(--bd);
    box-shadow:0 1px 4px rgba(0,0,0,.06);position:sticky;top:0;z-index:99}
.hd-in{max-width:1600px;margin:0 auto;padding:10px 20px;
       display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo-t{font-size:15px;font-weight:700}
.logo-s{font-size:10px;color:var(--mut);margin-top:1px}
.tabs{display:flex;gap:6px}
.tab{padding:5px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;
     border:1px solid var(--bd);background:var(--card);color:var(--mut);
     font-family:var(--sans);transition:all .15s}
.tab:hover{border-color:var(--blu);color:var(--blu)}
.tab.on-n{background:var(--blt);border-color:#93c5fd;color:var(--blu);font-weight:600}
.tab.on-s{background:#ecfeff;border-color:#67e8f9;color:#0e7490;font-weight:600}
.sa{display:flex;align-items:center;gap:8px;margin-left:auto;flex-wrap:wrap}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;
     background:var(--grn);animation:blink 2s infinite}
.dot.busy{background:#f59e0b}.dot.err{background:var(--red);animation:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#st{font-size:11px;color:var(--mut)}
#btn{font-size:13px;font-weight:500;color:var(--blu);background:var(--blt);
     border:1px solid #bfdbfe;border-radius:6px;padding:5px 14px;cursor:pointer;
     font-family:var(--sans);transition:all .15s}
#btn:hover{background:#dbeafe}
#btn:disabled{opacity:.5;cursor:not-allowed}
#bar{position:fixed;top:0;left:0;height:3px;background:var(--blu);width:0;transition:width .25s;z-index:200}
.mn{max-width:1600px;margin:0 auto;padding:14px 20px}
.cards{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.card{background:var(--card);border:1px solid var(--bd);border-radius:8px;
      padding:10px 16px;display:flex;align-items:center;gap:10px;
      box-shadow:0 1px 2px rgba(0,0,0,.04)}
.cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cl{font-size:10px;color:var(--mut)}
.cv{font-family:var(--mono);font-size:14px;font-weight:600;margin-top:2px}
.sh{display:none;font-size:10px;color:var(--dim);text-align:center;padding:3px 0}
@media(max-width:860px){.sh{display:block}}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:8px;
    border:1px solid var(--bd);background:var(--card);box-shadow:0 1px 3px rgba(0,0,0,.04)}
table{width:100%;border-collapse:collapse;min-width:1100px}
thead th{background:#f8f9fb;color:var(--mut);font-size:10.5px;font-weight:700;
         letter-spacing:.03em;padding:8px 9px;text-align:right;
         border-bottom:1px solid var(--bd);white-space:nowrap;
         cursor:pointer;user-select:none;transition:color .12s;font-family:var(--sans)}
thead th:first-child{text-align:left;padding-left:14px}
thead th:nth-child(2){text-align:left}
thead th:hover{color:var(--blu)}
thead th.sa::after{content:' ▲';color:var(--blu);font-size:8px}
thead th.sd::after{content:' ▼';color:var(--blu);font-size:8px}
tbody tr{border-bottom:1px solid #f0f2f5;transition:background .1s}
tbody tr:hover{background:#f7f9fc}
tbody tr:last-child{border-bottom:none}
tbody td{padding:7px 9px;text-align:right;white-space:nowrap;vertical-align:middle}
tbody td:first-child{text-align:left;padding-left:14px}
tbody td:nth-child(2){text-align:left}
.cc{font-family:var(--mono);font-size:12px;color:var(--blu);font-weight:600;
    cursor:pointer;text-decoration:underline;text-underline-offset:2px}
.cc:hover{color:#1d4ed8}
.cn{font-size:12px;color:var(--txt);max-width:130px;overflow:hidden;text-overflow:ellipsis;display:block}
.nm{font-family:var(--mono);font-size:12px}
.dm{font-family:var(--mono);font-size:12px;color:var(--dim)}
.dt{font-size:11px;color:var(--mut)}
.pos{color:var(--red)}.neg{color:var(--grn)}.neu{color:var(--mut)}
.phi{background:var(--phi-bg)!important;color:var(--phi-fg)!important;font-family:var(--mono);font-size:12px;font-weight:700}
.pmd{background:var(--pmd-bg)!important;color:var(--pmd-fg)!important;font-family:var(--mono);font-size:12px;font-weight:700}
.pno{font-family:var(--mono);font-size:12px;color:var(--mut)}
.plo{background:var(--plo-bg)!important;color:var(--plo-fg)!important;font-family:var(--mono);font-size:12px;font-weight:700}
.lgd{display:flex;flex-wrap:wrap;align-items:center;gap:10px;
     margin-top:12px;font-size:11px;color:var(--mut)}
.li{display:inline-flex;align-items:center;gap:4px}
.ld{width:10px;height:10px;border-radius:2px;display:inline-block;border:1px solid}
.note{margin-top:9px;font-size:10px;color:var(--dim);line-height:1.9;
      border-top:1px solid var(--bd);padding-top:9px}
@media(max-width:700px){.hd-in,.mn{padding-left:10px;padding-right:10px}table{min-width:900px}.cards{gap:7px}}
</style>
</head>
<body>
<div id="bar"></div>

<div class="hd">
  <div class="hd-in">
    <div style="display:flex;align-items:center;gap:9px">
      <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
        <rect width="26" height="26" rx="6" fill="#eff6ff"/>
        <polyline points="3,19 8,11 13,15 18,7 23,7" stroke="#2563eb" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="23" cy="7" r="2" fill="#2563eb"/>
      </svg>
      <div><div class="logo-t">美股指数ETF监控</div>
      <div class="logo-s">纳斯达克100 · 标普500 · 点击代码查看3月溢价历史</div></div>
    </div>
    <div class="tabs">
      <button class="tab on-n" id="tn" onclick="go('ndx')">纳斯达克100 <span style="opacity:.55;font-size:11px">(13只)</span></button>
      <button class="tab" id="ts" onclick="go('spx')">标普500 <span style="opacity:.55;font-size:11px">(5只)</span></button>
    </div>
    <div class="sa">
      <span class="dot" id="dot"></span><span id="st">就绪</span>
      <button id="btn" onclick="doRefresh()">⟳ 刷新数据</button>
    </div>
  </div>
</div>

<div class="mn">
  <div class="cards">
    <div class="card"><div class="cdot" style="background:#2563eb"></div>
      <div><div class="cl">纳指100期货 (NQ)</div><div class="cv" id="ci-n">--</div></div></div>
    <div class="card"><div class="cdot" style="background:#0e7490"></div>
      <div><div class="cl">标普500期货 (ES)</div><div class="cv" id="ci-s">--</div></div></div>
    <div class="card"><div class="cdot" style="background:#d97706"></div>
      <div><div class="cl">USD/CNY 中间价</div><div class="cv" id="ci-u" style="font-size:13px;color:var(--mut)">--</div></div></div>
    <div class="card" style="margin-left:auto">
      <div><div class="cl">最后更新</div><div class="cv" id="ci-ts" style="font-size:12px;color:var(--mut)">--</div></div></div>
  </div>
  <div class="sh">← 左右滑动查看完整数据 →</div>
  <div id="wn"><div class="tw"><table><thead><tr id="hn"></tr></thead><tbody id="bn"></tbody></table></div></div>
  <div id="ws" style="display:none"><div class="tw"><table><thead><tr id="hs"></tr></thead><tbody id="bs"></tbody></table></div></div>
  <div class="lgd">
    <b style="color:var(--mut)">溢价率</b>
    <span class="li"><span class="ld" style="background:var(--phi-bg);border-color:#fca5a5"></span><span style="color:var(--phi-fg)">&gt;3%</span></span>
    <span class="li"><span class="ld" style="background:var(--pmd-bg);border-color:#fcd34d"></span><span style="color:var(--pmd-fg)">1%~3%</span></span>
    <span class="li"><span class="ld" style="background:#fff;border-color:var(--bd)"></span>-1%~1%</span>
    <span class="li"><span class="ld" style="background:var(--plo-bg);border-color:#86efac"></span><span style="color:var(--plo-fg)">&lt;-1%</span></span>
    <span style="margin-left:auto;color:var(--dim)">数据：天天基金 · 腾讯财经</span>
  </div>
  <div class="note">
    ⚠ <b>盘中估值(gsz)</b>：天天基金推算，A股盘中固定（美股闭市）。
    <b>净值(T-1)</b>：前一交易日官方净值(dwjz)。
    <b>实时溢价</b> = 现价÷gsz−1。<b>最新溢价★</b> = 现价÷T-1净值−1（套利判断核心指标，加粗显示）。
    红涨绿跌（A股惯例）。点击代码查看3月历史溢价走势，不构成投资建议。
  </div>
</div>

<script>
/* =============================================================
   基金数据库  [代码, 简称, 管+托%, 申购%, 赎回%]
   ★ 新增基金：末尾加一行
============================================================= */
const DB={
  ndx:[
    ['159941','广发纳指100ETF',    0.20,0.00,0.00],
    ['513300','华夏纳指100ETF',    0.20,0.00,0.00],
    ['513100','国泰纳指100ETF',    0.20,0.00,0.00],
    ['159501','嘉实纳指100ETF',    0.20,0.00,0.00],
    ['159632','华安纳斯达克ETF',   0.20,0.00,0.00],
    ['513390','博时纳指100ETF',    0.20,0.00,0.00],
    ['159660','汇添富纳指100ETF',  0.20,0.00,0.00],
    ['159659','招商纳斯达克100ETF',0.20,0.00,0.00],
    ['513110','华泰柏瑞纳指ETF',   0.20,0.00,0.00],
    ['159696','易方达纳指100ETF',  0.20,0.00,0.00],
    ['159513','大成纳斯达克100ETF',0.20,0.00,0.00],
    ['513870','富国纳指100ETF',    0.20,0.00,0.00],
    ['161130','易方达纳指100LOF',  0.60,1.20,0.50],
  ],
  spx:[
    ['513500','博时标普500ETF',   0.20,0.00,0.00],
    ['513650','南方标普500ETF',   0.20,0.00,0.00],
    ['159612','国泰标普500ETF',   0.20,0.00,0.00],
    ['159655','华夏标普500ETF',   0.20,0.00,0.00],
    ['161125','易方达标普500LOF', 0.60,1.20,0.50],
  ],
};
const ALL=[...DB.ndx,...DB.spx];
const COLS=[
  {k:'code',    l:'代码',      t:'code'},
  {k:'name',    l:'基金简称',  t:'name'},
  {k:'price',   l:'现价',      t:'price'},
  {k:'pct',     l:'涨跌%',     t:'pct'},
  {k:'navEst',  l:'盘中估值',  t:'n4'},
  {k:'realPrem',l:'实时溢价%', t:'prem'},
  {k:'nav',     l:'净值(T-1)', t:'n4'},
  {k:'latPrem', l:'最新溢价%★',t:'premB'},
  {k:'navPct',  l:'净值涨跌%', t:'pct'},
  {k:'navDate', l:'净值日期',  t:'date'},
  {k:'amount',  l:'成交额(万)',t:'amt'},
  {k:'fees',    l:'管理+托管%',t:'fee'},
  {k:'purchase',l:'申购费%',   t:'fee'},
  {k:'redeem',  l:'赎回费%',   t:'fee'},
];

let tab='ndx',sk='amount',sd=-1,pk='',busy=false;
let D={ndx:{},spx:{}};

function exch(c){return c[0]==='5'?'sh':'sz'}
const n4=v=>v==null||isNaN(+v)?'--':(+v).toFixed(4);
const n2=v=>v==null||isNaN(+v)?'--':(+v).toFixed(2);
const fp=v=>{if(v==null||isNaN(+v))return'--';return(v>=0?'+':'')+n2(v)+'%'};
const fa=v=>{if(v==null||isNaN(+v))return'--';const n=+v;return n>=100000?(n/10000).toFixed(1)+'亿':n.toLocaleString('zh-CN',{maximumFractionDigits:0})};
const clr=v=>v==null||isNaN(+v)?'neu':+v>0?'pos':+v<0?'neg':'neu';
const pcls=v=>{if(v==null||isNaN(+v))return'pno';if(+v>3)return'phi';if(+v>=1)return'pmd';if(+v<-1)return'plo';return'pno'};

function head(t){
  const tr=document.getElementById('h'+t[0]);tr.innerHTML='';
  COLS.forEach(c=>{const th=document.createElement('th');th.textContent=c.l;th.onclick=()=>srt(c.k);if(c.k===sk)th.classList.add(sd===1?'sa':'sd');tr.appendChild(th)});
}
function draw(t){
  head(t);
  const tbody=document.getElementById('b'+t[0]);
  let rows=DB[t].map(f=>{const d=D[t][f[0]]||{};return{code:f[0],name:f[1],fees:f[2],purchase:f[3],redeem:f[4],price:d.price??null,pct:d.pct??null,navEst:d.navEst??null,realPrem:d.realPrem??null,nav:d.nav??null,latPrem:d.latPrem??null,navPct:d.navPct??null,navDate:d.navDate??'--',amount:d.amount??null}});
  rows.sort((a,b)=>{let av=a[sk],bv=b[sk];const m=sd===1?Infinity:-Infinity;if(av==null)av=m;if(bv==null)bv=m;return sd*(typeof av==='string'?av.localeCompare(bv,'zh'):av-bv)});
  tbody.innerHTML='';
  rows.forEach(r=>{
    const tr=document.createElement('tr');
    COLS.forEach(c=>{
      const td=document.createElement('td');const v=r[c.k];
      switch(c.t){
        case'code': td.innerHTML=`<span class="cc" onclick="openHist('${r.code}','${r.name}')">${r.code}</span>`;break;
        case'name': td.innerHTML=`<span class="cn" title="${r.name}">${r.name}</span>`;break;
        case'price': td.className=`nm ${clr(r.pct)}`;td.textContent=n4(v);break;
        case'pct': td.className=`nm ${clr(v)}`;td.textContent=fp(v);break;
        case'prem': td.className=pcls(v);td.textContent=fp(v);break;
        case'premB': td.className=pcls(v);td.style.fontWeight='700';td.textContent=fp(v);break;
        case'n4': td.className='nm';td.style.color='var(--txt)';td.textContent=n4(v);break;
        case'amt': td.className='nm';td.style.color=v!=null?'var(--txt)':'var(--dim)';td.textContent=fa(v);break;
        case'date': td.className='dt';td.textContent=v||'--';break;
        case'fee': td.className='dm';td.textContent=n2(v);break;
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}
function srt(k){if(pk===k)sd=-sd;else sd=(k==='amount')?-1:1;sk=k;pk=k;draw('ndx');draw('spx')}
function go(t){
  tab=t;
  document.getElementById('wn').style.display=t==='ndx'?'':'none';
  document.getElementById('ws').style.display=t==='spx'?'':'none';
  document.getElementById('tn').className='tab'+(t==='ndx'?' on-n':'');
  document.getElementById('ts').className='tab'+(t==='spx'?' on-s':'');
}
function setSt(s,m){
  document.getElementById('dot').className='dot'+(s==='busy'?' busy':s==='err'?' err':'');
  document.getElementById('st').textContent=m;
  const b=document.getElementById('btn');b.disabled=s==='busy';b.textContent=s==='busy'?'加载中…':'⟳ 刷新数据';
}
function prog(p){document.getElementById('bar').style.width=p+'%'}

/* =============================================================
   天天基金 JSONP 队列（串行，固定回调名 jsonpgz）
   gsz   = 盘中估算净值（A股盘中QDII不动，美股开盘后才更新）
   dwjz  = T-1官方净值 ← 最新溢价的分母
   gszzl = 估算涨跌%
   jzrq  = 净值日期
============================================================= */
const _q=[];let _run=false;
function navQ(code){return new Promise(r=>{_q.push({code,r});if(!_run)_drain()})}
function _drain(){
  if(!_q.length){_run=false;return}
  _run=true;
  const{code,r}=_q.shift();
  const s=document.createElement('script');let ok=false;
  const prev=window.jsonpgz;
  const fin=val=>{if(ok)return;ok=true;clearTimeout(tid);window.jsonpgz=prev;s.parentNode&&s.parentNode.removeChild(s);r(val);_drain()};
  window.jsonpgz=d=>fin({navEst:parseFloat(d.gsz)||null,nav:parseFloat(d.dwjz)||null,navPct:parseFloat(d.gszzl)||null,navDate:d.jzrq||'--'});
  s.onerror=()=>fin(null);
  const tid=setTimeout(()=>fin(null),6000);
  s.src=`https://fundgz.1234567.com.cn/js/${code}.js?rt=${Date.now()}`;
  document.head.appendChild(s);
}

/* =============================================================
   腾讯行情 script注入
   p[3]=现价 p[4]=昨收 p[37]=成交额(万元)
============================================================= */
function fetchQt(funds){
  return new Promise(r=>{
    const syms=funds.map(f=>exch(f[0])+f[0]).join(',');
    const s=document.createElement('script');let ok=false;
    const fin=()=>{
      if(ok)return;ok=true;clearTimeout(tid);s.parentNode&&s.parentNode.removeChild(s);
      const out={};
      funds.forEach(f=>{
        const key='v_'+exch(f[0])+f[0];const raw=window[key];
        if(!raw){delete window[key];return}delete window[key];
        const p=raw.split('~');if(p.length<38)return;
        const price=parseFloat(p[3]),prev=parseFloat(p[4]),amt=parseFloat(p[37])||0;
        if(!price||!prev)return;
        out[f[0]]={price,pct:(price-prev)/prev*100,amount:amt};
      });
      r(out);
    };
    s.onload=fin;s.onerror=fin;const tid=setTimeout(fin,8000);
    s.src=`https://qt.gtimg.cn/q=${syms}&r=${Date.now()}`;document.head.appendChild(s);
  });
}
function fetchIdx(){
  return new Promise(r=>{
    const s=document.createElement('script');let ok=false;
    const fin=()=>{
      if(ok)return;ok=true;clearTimeout(tid);s.parentNode&&s.parentNode.removeChild(s);
      const prs=key=>{const raw=window[key];if(!raw){delete window[key];return null}delete window[key];const p=raw.split('~');const c=parseFloat(p[3]),v=parseFloat(p[4]);return(c&&v)?(c-v)/v*100:null};
      r({ndx:prs('v_us_ndx'),spx:prs('v_us_spx')});
    };
    s.onload=fin;s.onerror=()=>r({ndx:null,spx:null});const tid=setTimeout(()=>r({ndx:null,spx:null}),8000);
    s.src=`https://qt.gtimg.cn/q=us_ndx,us_spx&r=${Date.now()}`;document.head.appendChild(s);
  });
}
function fetchUSD(){
  return new Promise(r=>{
    const s=document.createElement('script');let ok=false;
    const fin=()=>{if(ok)return;ok=true;clearTimeout(tid);s.parentNode&&s.parentNode.removeChild(s);const raw=window['v_usdcnyboc'];if(raw){delete window['v_usdcnyboc'];r(parseFloat(raw.split('~')[3])||null)}else r(null)};
    s.onload=fin;s.onerror=()=>r(null);const tid=setTimeout(()=>r(null),6000);
    s.src=`https://qt.gtimg.cn/q=usdcnyboc&r=${Date.now()}`;document.head.appendChild(s);
  });
}

/* =============================================================
   主刷新
============================================================= */
async function fetchAll(){
  if(busy)return;busy=true;setSt('busy','加载中…');prog(5);
  const[qt,idx,usd]=await Promise.all([fetchQt(ALL),fetchIdx(),fetchUSD()]);
  prog(25);
  const ri=v=>v==null?'--':(+v>=0?`<span class="pos">+${n2(v)}%</span>`:`<span class="neg">${n2(v)}%</span>`);
  document.getElementById('ci-n').innerHTML=ri(idx.ndx);
  document.getElementById('ci-s').innerHTML=ri(idx.spx);
  document.getElementById('ci-u').textContent=usd?n4(usd):'--';
  const total=ALL.length;let done=0;
  const navPs=ALL.map(f=>navQ(f[0]).then(d=>{done++;setSt('busy',`加载 ${done}/${total}`);prog(25+Math.round(done/total*70));return{code:f[0],d}}));
  const navList=await Promise.all(navPs);
  prog(95);
  ALL.forEach(f=>{
    const code=f[0],t=DB.ndx.includes(f)?'ndx':'spx';
    if(!D[t][code])D[t][code]={};const dd=D[t][code];
    const q=qt[code];if(q){dd.price=q.price;dd.pct=q.pct;dd.amount=q.amount}
    const nr=navList.find(x=>x.code===code)?.d;
    if(nr){
      dd.navEst=nr.navEst;dd.nav=nr.nav;dd.navPct=nr.navPct;dd.navDate=nr.navDate;
      if(dd.price&&nr.navEst&&nr.navEst!==0)dd.realPrem=(dd.price/nr.navEst-1)*100;
      if(dd.price&&nr.nav&&nr.nav!==0)      dd.latPrem=(dd.price/nr.nav-1)*100;
    }
  });
  prog(100);draw('ndx');draw('spx');
  document.getElementById('ci-ts').textContent=new Date().toLocaleTimeString('zh-CN',{hour12:false});
  const has=Object.values(D.ndx).some(d=>d.price!=null)||Object.values(D.spx).some(d=>d.price!=null);
  setSt(has?'ok':'err',has?'数据已更新':'获取失败');setTimeout(()=>prog(0),500);busy=false;
}
function doRefresh(){if(!busy)fetchAll()}

/* =============================================================
   历史溢价 - 新标签页
   数据来源：
   ① 历史净值：东方财富 open API（JSON，无需 Referer）
      https://api.fund.eastmoney.com/f10/lsjz?callback=...&fundCode=...&page=1&pageSize=100&startDate=...&endDate=...&_=...
   ② 历史收盘：腾讯 k线 JSON 接口（直接 fetch，支持 CORS）
      https://web.ifzq.gtimg.cn/appstock/app/fqkline/get?_var=kline_dayqfq&param={prefix}{code},day,{start},,60,qfq&r=...
============================================================= */
async function openHist(code,name){
  // 打开新标签，先显示加载中
  const win=window.open('','_blank');
  if(!win){alert('请允许弹出窗口');return}

  const H=buildHistHTML(code,name);
  win.document.open();win.document.write(H);win.document.close();

  try{
    const[navMap,priceMap]=await Promise.all([
      fetchHistNavJson(code),
      fetchHistPriceJson(code),
    ]);

    const navDates=Object.keys(navMap).sort();
    const priceDates=Object.keys(priceMap).sort();

    // 只取近3个月
    const cut=new Date();cut.setMonth(cut.getMonth()-3);
    const cutStr=cut.toISOString().slice(0,10);

    const rows=[];
    priceDates.filter(d=>d>=cutStr).forEach(date=>{
      const price=priceMap[date];
      // T-1净值：找price日期之前最近的净值日期
      let prevNavDate=null;
      for(let i=navDates.length-1;i>=0;i--){if(navDates[i]<date){prevNavDate=navDates[i];break}}
      const nav=prevNavDate?navMap[prevNavDate]:null;
      // 当日净值（用于计算日涨跌）
      const navToday=navMap[date]||null;
      let navChg=null;
      if(navToday&&prevNavDate&&navMap[prevNavDate])navChg=(navToday/navMap[prevNavDate]-1)*100;
      const prem=(price&&nav&&nav!==0)?((price/nav-1)*100):null;
      rows.push({date,price,nav,prem,navChg});
    });
    rows.reverse();// 新→旧

    const prems=rows.filter(r=>r.prem!=null).map(r=>r.prem);
    const avg=prems.length?prems.reduce((a,b)=>a+b,0)/prems.length:null;
    const mx=prems.length?Math.max(...prems):null;
    const mn=prems.length?Math.min(...prems):null;
    const cur=rows[0]?.prem??null;

    // 填充统计卡片
    const fp2=v=>{if(v==null||isNaN(+v))return'--';return(v>=0?'+':'')+v.toFixed(2)+'%'};
    const n4w=v=>v==null||isNaN(+v)?'--':(+v).toFixed(4);
    const pc=v=>{if(v==null||isNaN(+v))return'pno';if(+v>3)return'phi';if(+v>=1)return'pmd';if(+v<-1)return'plo';return'pno'};
    const cr=v=>v==null||isNaN(+v)?'neu':+v>0?'pos':+v<0?'neg':'neu';

    const stats=win.document.getElementById('stats');
    if(stats)stats.innerHTML=`
      <div class="stat"><div class="sl">当前最新溢价</div><div class="sv ${pc(cur)}">${fp2(cur)}</div></div>
      <div class="stat"><div class="sl">3月平均溢价</div><div class="sv ${pc(avg)}">${fp2(avg)}</div></div>
      <div class="stat"><div class="sl">3月最高溢价</div><div class="sv ${pc(mx)}">${fp2(mx)}</div></div>
      <div class="stat"><div class="sl">3月最低溢价</div><div class="sv ${pc(mn)}">${fp2(mn)}</div></div>
      <div class="stat"><div class="sl">有效数据天数</div><div class="sv">${prems.length}天</div></div>`;

    const htb=win.document.getElementById('htb');
    if(htb){htb.innerHTML='';rows.forEach(r=>{const tr=win.document.createElement('tr');tr.innerHTML=`<td>${r.date}</td><td>${n4w(r.price)}</td><td>${n4w(r.nav)}</td><td class="${pc(r.prem)}">${fp2(r.prem)}</td><td class="${cr(r.navChg)}">${fp2(r.navChg)}</td>`;htb.appendChild(tr)})}

    // 画图
    drawChart(win,rows.slice().reverse());

    const ld=win.document.getElementById('ld');if(ld)ld.style.display='none';
    const ct=win.document.getElementById('content');if(ct)ct.style.display='block';

    if(!prems.length){const ld=win.document.getElementById('ld');if(ld){ld.style.display='block';ld.textContent='暂无溢价数据（净值与收盘日期无法匹配）'}}

  }catch(e){
    const ld=win.document.getElementById('ld');
    if(ld){ld.style.display='block';ld.textContent='加载失败：'+e.message}
    console.error(e);
  }
}

/* ── 历史净值：东方财富 open API（JSON格式，CORS友好）── */
async function fetchHistNavJson(code){
  const ed=new Date().toISOString().slice(0,10);
  const sd=new Date();sd.setMonth(sd.getMonth()-4);
  const sdate=sd.toISOString().slice(0,10);
  // 东方财富移动端接口，返回标准JSON，无需特殊头
  const url=`https://api.fund.eastmoney.com/f10/lsjz?callback=cb&fundCode=${code}&page=1&pageSize=120&startDate=${sdate}&endDate=${ed}&_=${Date.now()}`;
  const res=await fetch(url,{headers:{Referer:'https://fund.eastmoney.com/'}});
  const text=await res.text();
  // 返回格式: cb({...}) 或 纯JSON
  const jsonStr=text.startsWith('cb(')?text.slice(3,-1):text;
  const json=JSON.parse(jsonStr);
  const map={};
  (json?.Data?.LSJZList||[]).forEach(item=>{
    const date=item.FSRQ;// "2025-01-10"
    const nav=parseFloat(item.DWJZ);
    if(date&&!isNaN(nav)&&nav>0)map[date]=nav;
  });
  if(!Object.keys(map).length)throw new Error(`净值接口返回0条数据 (code=${code})`);
  return map;
}

/* ── 历史收盘：腾讯 ifzq k线接口（JSON格式，CORS友好）── */
async function fetchHistPriceJson(code){
  const prefix=exch(code);
  const sd=new Date();sd.setMonth(sd.getMonth()-4);
  const sdate=sd.toISOString().slice(0,10).replace(/-/g,'');
  // 腾讯 ifzq 接口：返回后复权日K线 JSON
  const url=`https://web.ifzq.gtimg.cn/appstock/app/fqkline/get?_var=kline_dayqfq&param=${prefix}${code},day,${sdate},,120,qfq&r=${Date.now()}`;
  const res=await fetch(url);
  const text=await res.text();
  // 格式: var kline_dayqfq={...}  或直接JSON
  const jsonStr=text.includes('=')?text.slice(text.indexOf('=')+1).trim():text;
  const json=JSON.parse(jsonStr);
  // 数据路径: json.data["{prefix}{code}"].day 或 .qfqday
  const sym=prefix+code;
  const kdata=json?.data?.[sym]?.qfqday||json?.data?.[sym]?.day||[];
  const map={};
  kdata.forEach(item=>{
    // item = ["2025-01-10", open, close, high, low, vol, ...]  注意腾讯顺序
    // 实际字段: [日期, 开盘, 收盘, 最高, 最低, 成交量, 成交额, ...]
    if(!Array.isArray(item)||item.length<3)return;
    const date=item[0];// "2025-01-10"
    const close=parseFloat(item[2]);// 第3个字段是收盘价
    if(date&&!isNaN(close)&&close>0)map[date]=close;
  });
  if(!Object.keys(map).length)throw new Error(`收盘价接口返回0条数据 (code=${code})`);
  return map;
}

/* ── 绘图 ── */
function drawChart(win,rows){
  const cv=win.document.getElementById('cv');if(!cv)return;
  const W=cv.parentElement.clientWidth||720;cv.width=W;cv.height=220;
  const ctx=cv.getContext('2d'),H=220;
  const PAD={t:14,r:20,b:32,l:52};
  const dw=W-PAD.l-PAD.r,dh=H-PAD.t-PAD.b;
  const pts=rows.filter(r=>r.prem!=null);if(!pts.length)return;
  const vals=pts.map(r=>r.prem);
  let lo=Math.min(...vals,-2),hi=Math.max(...vals,4);
  const pad=(hi-lo)*0.12;lo-=pad;hi+=pad;
  const ys=v=>PAD.t+dh*(1-(v-lo)/(hi-lo));
  const xs=i=>PAD.l+i*(dw/(pts.length-1||1));
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  [{v:3,c:'#fca5a5',l:'3%',fg:'#dc2626'},{v:1,c:'#fde68a',l:'1%',fg:'#92400e'},{v:0,c:'#d1d5db',l:'0%',fg:'#9ca3af'},{v:-1,c:'#86efac',l:'-1%',fg:'#15803d'}].forEach(h=>{
    if(h.v<lo||h.v>hi)return;const y=ys(h.v);
    ctx.beginPath();ctx.strokeStyle=h.c;ctx.lineWidth=1;ctx.setLineDash(h.v===0?[]:[4,3]);
    ctx.moveTo(PAD.l,y);ctx.lineTo(W-PAD.r,y);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle=h.fg;ctx.font='10px Consolas,monospace';ctx.textAlign='right';ctx.fillText(h.l,PAD.l-4,y+3);
  });
  ctx.beginPath();pts.forEach((p,i)=>i===0?ctx.moveTo(xs(i),ys(p.prem)):ctx.lineTo(xs(i),ys(p.prem)));
  ctx.lineTo(xs(pts.length-1),H-PAD.b);ctx.lineTo(PAD.l,H-PAD.b);ctx.closePath();
  ctx.fillStyle='rgba(37,99,235,0.07)';ctx.fill();
  ctx.beginPath();pts.forEach((p,i)=>i===0?ctx.moveTo(xs(i),ys(p.prem)):ctx.lineTo(xs(i),ys(p.prem)));
  ctx.strokeStyle='#2563eb';ctx.lineWidth=2;ctx.setLineDash([]);ctx.stroke();
  pts.forEach((p,i)=>{const x=xs(i),y=ys(p.prem);const c=p.prem>3?'#dc2626':p.prem>1?'#d97706':p.prem<-1?'#16a34a':'#2563eb';ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);ctx.fillStyle=c;ctx.fill()});
  ctx.fillStyle='#9ca3af';ctx.font='9px Arial';ctx.textAlign='center';
  const step=Math.max(1,Math.floor(pts.length/7));
  pts.forEach((p,i)=>{if(i%step!==0&&i!==pts.length-1)return;ctx.fillText(p.date.slice(5),xs(i),H-8)});
}
